---
name: E2E Presets

# Full-realism preset coverage. For each preset in presets.json:
#
#  seed -- install the real tool with its canonical setup action, stamp a per-run marker into the resolved
#          preset directory (which fails if the tool did not land where the preset expects), then let recall
#          save that real directory.
#  warm -- on a fresh runner, restore via recall and prove the saved directory came back by checking the
#          marker. The marker can only reach the runner through the cache, so it is unambiguous provenance.
#
# Heavy (saves real tool caches) and shared-state, so manual-only.

on:
  workflow_dispatch:

concurrency:
  # Caches are shared state -- do not cancel a run while a post step is saving.
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  seed:
    name: Seed ${{ matrix.preset }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write # gh cache delete
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: node
            major: '20'
            setup-version: '20'
          - preset: python
            major: '3.12'
            setup-version: '3.12'
          - preset: go
            major: '1.22'
            setup-version: '1.22'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Build Action
        run: |
          npm ci
          npm run build

      # Force a cold seed so this run's marker is the one that gets saved. Real preset key-prefixes are used
      # deliberately (this repo has no production consumers to evict).
      - name: Purge Preset Cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRESET: ${{ matrix.preset }}
          MAJOR: ${{ matrix.major }}
        run: |
          prefix="$(.github/scripts/e2e-preset.sh prefix "$PRESET" "$MAJOR")"
          printf 'purging caches with prefix "%s-"\n' "$prefix"
          gh cache list --repo "$GITHUB_REPOSITORY" --limit 1000 --json id,key -q '.[] | [.id, .key] | @tsv' \
            | while IFS=$'\t' read -r id key; do
                case "$key" in
                  "$prefix-"*) gh cache delete "$id" --repo "$GITHUB_REPOSITORY" || true ;;
                esac
              done

      - name: Setup Tool (Node)
        if: matrix.preset == 'node'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.setup-version }}

      - name: Setup Tool (Python)
        if: matrix.preset == 'python'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.setup-version }}

      - name: Setup Tool (Go)
        if: matrix.preset == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.setup-version }}
          cache: false # this repo has no go.mod; we only need the toolchain in the tool cache

      # Stamp before recall saves (the post step runs at job end and tars the directory with the marker).
      - name: Stamp Marker
        env:
          PRESET: ${{ matrix.preset }}
          MARKER: ${{ github.run_id }}-${{ github.run_attempt }}
        run: .github/scripts/e2e-preset.sh stamp "$PRESET" "$MARKER"

      - name: Recall Restore (Cold)
        id: recall
        uses: ./
        with:
          tool: ${{ matrix.preset }}
          tool-major: ${{ matrix.major }}
          save-on-default-branch-only: 'false'

      - name: Assert Cold Miss
        env:
          RESTORED: ${{ steps.recall.outputs.cache-restored }}
        run: |
          test "$RESTORED" = "false" \
            || { printf '::error::expected cold miss after purge, got cache-restored="%s"\n' "$RESTORED" >&2; exit 1; }

  warm:
    name: Warm ${{ matrix.preset }}
    needs: seed
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: node
            major: '20'
          - preset: python
            major: '3.12'
          - preset: go
            major: '1.22'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Build Action
        run: |
          npm ci
          npm run build

      - name: Recall Restore (Warm)
        id: recall
        uses: ./
        with:
          tool: ${{ matrix.preset }}
          tool-major: ${{ matrix.major }}
          save-on-default-branch-only: 'false'

      - name: Assert Restore And Marker
        env:
          PRESET: ${{ matrix.preset }}
          MARKER: ${{ github.run_id }}-${{ github.run_attempt }}
          RESTORED: ${{ steps.recall.outputs.cache-restored }}
        run: .github/scripts/e2e-preset.sh assert "$PRESET" "$MARKER" "$RESTORED"
