---
name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: CI
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set Up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Node Toolchain Lockfile Sync
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json

      - name: Typecheck
        run: npm run typecheck

      - name: Run Unit Tests
        run: npm test

      - name: Build Bundles
        run: npm run build

      - name: Pedant
        id: pedant
        continue-on-error: true
        uses: goeselt/pedant@b8e404a982679f74a8cd9309de5d2492bc8030c3 # v1.2.3
        with:
          ignore: dist/
          summary-github-step: true

      - name: Publish Pedant Report
        if: always()
        uses: goeselt/remark@b5a3f7c0d7b25e6634f1f2f9ef13e6b808370972 # v1.0.3
        with:
          body: ${{ steps.pedant.outputs.summary }}
          comment-key: pedant
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-unchanged: true

      - name: Fail On Pedant Findings
        if: steps.pedant.outcome != 'success'
        run: exit 1
